<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Xen Mission HUD</title><style>
:root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#05080d;color:#eef5ff}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px}.xlie-hud{width:min(920px,100%);padding:24px;border:1px solid #27445a;border-radius:24px;background:linear-gradient(145deg,#0c1520,#071019);box-shadow:0 24px 80px #0008}.xlie-hud small{color:#7fd8ff}.xlie-hud h1{margin:.35rem 0 1rem;font-size:clamp(2rem,6vw,4.5rem)}progress{width:100%;accent-color:#62e3bd}.hud-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:20px}.hud-grid article{padding:16px;border:1px solid #1c3649;border-radius:16px;background:#0b1823}.hud-grid b{color:#e8c66d}.hud-grid p{min-height:2.5em}.hud-alerts{color:#ffcf78}@media(prefers-reduced-motion:no-preference){.xlie-hud{animation:arrive .5s ease-out}@keyframes arrive{from{opacity:0;transform:translateY(10px)}}}</style></head><body><main data-xlie-mission-hud data-model='{"title":"Location Mission","position_truth":"planned","live_navigation_verified":false,"phases":[{"objective":"Confirm origin and destination","status":"active"},{"objective":"Navigate","status":"planned"},{"objective":"Execute and verify","status":"planned"},{"objective":"Debrief and archive","status":"planned"}]}'></main><script type="module" src="./src/xlie-xlee-mission-hud.js"></script></body></html>
